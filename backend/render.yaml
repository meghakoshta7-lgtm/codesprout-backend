services:
  - type: web
    name: codesprout-backend
    runtime: node
    buildCommand: npm install && npm run build && npm install -g pm2
    startCommand: pm2-runtime start ecosystem.config.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "CodeSprout <noreply@codesprout.com>"
      - key: FRONTEND_URL
        value: https://codesprout-nine.vercel.app
      - key: UPI_ID
        sync: false
      - key: UPI_PAYEE_NAME
        value: CodeSprout
      - key: UPI_CURRENCY
        value: INR
      - key: PREMIUM_AMOUNT
        value: "49"
      - key: SUBSCRIPTION_DAYS
        value: "30"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health
