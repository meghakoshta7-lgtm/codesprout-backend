services:
  - type: web
    name: codesprout-backend
    runtime: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "CodeSprout <noreply@codesprout.com>"
      - key: FRONTEND_URL
        value: https://codesproutcom.vercel.app
      - key: UPI_ID
        sync: false
      - key: UPI_PAYEE_NAME
        value: CodeSprout
      - key: UPI_CURRENCY
        value: INR
      - key: PREMIUM_AMOUNT
        value: "49"
      - key: SUBSCRIPTION_DAYS
        value: "30"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://127.0.0.1:3001
      - key: CONTENT_SERVICE_URL
        value: http://127.0.0.1:3002
      - key: SOCIAL_SERVICE_URL
        value: http://127.0.0.1:3003
      - key: EXECUTION_SERVICE_URL
        value: http://127.0.0.1:3004
      - key: PAYMENT_SERVICE_URL
        value: http://127.0.0.1:3005
      - key: RESUME_SERVICE_URL
        value: http://127.0.0.1:3006
    healthCheckPath: /health
